name: t_pdf_reader
description: "A performant Flutter PDF viewer capable of handling large PDF files smoothly. Built on than_pdf_engine, this package provides a clean foundation for custom PDF implementations, allowing users to build upon its core engine to add specific functionalities"
version: 0.2.0
homepage: https://github.com/ThanCoder/t_pdf_reader.git
repository: https://github.com/ThanCoder/t_pdf_reader.git

environment:
  sdk: ^3.12.0
  flutter: ">=3.3.0"

dependencies:
  flutter:
    sdk: flutter
  dart_core_extensions: ^0.4.0
  than_pdf_engine: ^0.3.0
  pdfium_dart: ^0.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
